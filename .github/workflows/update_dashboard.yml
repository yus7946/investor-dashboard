name: Update Dashboard

on:
  schedule:
    # JST 8:30 = UTC 23:30（前日）。平日のみ。
    - cron: "30 23 * * 0-4"
    # JST 11:30 = UTC 2:30。平日のみ。
    - cron: "30 2 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python main.py
      - run: python update_dashboard.py
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/ docs/
          git diff --cached --quiet || git commit -m "chore: update dashboard data"
          git push
