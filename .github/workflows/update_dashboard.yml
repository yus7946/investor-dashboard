name: Update Dashboard

on:
  schedule:
    # JST 7:30 = UTC 22:30（前日）。平日のみ。
    - cron: "30 22 * * 0-4"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python main.py
      - run: python update_dashboard.py
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/
          git diff --cached --quiet || git commit -m "chore: update dashboard data"
          git push
